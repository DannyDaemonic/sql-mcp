name: docker-publish

# Test, then build and publish the scratch image to GitHub Container Registry,
# then delete untagged image versions so superseded builds don't linger.
# Pushes to the default branch publish `latest`; tags like v1.2.3 publish
# semver tags. No secrets to configure — GITHUB_TOKEN is enough for ghcr.

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # The artifact gate: nothing publishes unless every suite passes. Style
  # checks (fmt/clippy) live in ci.yml — they judge the code, not the image,
  # and must never block a hotfix release. ubuntu-latest runners have Docker,
  # so the testcontainers MySQL/MariaDB suite runs too (first run pulls the
  # mysql:8/mariadb:11 images).
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Tests (unit + sqlite + http + live MySQL/MariaDB)
        run: cargo test

  publish:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # arm64 is built under QEMU; the Rust release build (LTO, bundled
      # SQLite) makes that leg slow — expect tens of minutes. Drop the
      # platform below if publish latency ever matters more than Apple
      # Silicon / ARM hosts pulling a native image.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # No `type=sha` tags on purpose: every superseded build would stay
      # pullable forever under its sha tag, which is exactly what the cleanup
      # job exists to prevent. Rollback = rebuild from git.
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Provenance attestations show up as extra untagged "unknown/unknown"
          # package versions in the ghcr UI; skip them to keep the package
          # list equal to what's actually pullable.
          provenance: false

  # GHCR has no built-in retention policy: each new `latest` leaves the old
  # image as an untagged-but-pullable version. This deletes those. The action
  # understands multi-arch manifest lists — naive "delete untagged" cleanup
  # (e.g. actions/delete-package-versions) would delete the per-arch child
  # manifests that `latest` itself points at, breaking the published image.
  cleanup:
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      packages: write
    steps:
      - name: Delete untagged image versions
        uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          validate: true
